spring:
  config:
    activate:
      on-profile: test
  application:
    name: dash
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:dash

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true

jwt:
  secret-key: dskljfgklfgjfklsdgjldfksgjldksjklgjdsflkgjfdsklgjdslk
  access-token-valid-time: 100000
  refresh-token-valid-time: 100000000

kakao:
  client-id: 1234

s3:
  secret-key: 1234
  access-key: 1234
  s3-endpoint: www.s3.com
  region: ap-northeast-2
  s3-bucket-name: s3

naver:
  client-id: 1234
  client-secret: 1234

toss:
  client_id: 1234
  payment_uri: 1234
  connection-timeout: 1234
  read-timeout: 1234
  socket-timeout: 1234
  cancel-uri: 1234

solapi:
  api-key: 1234
  api-secret: 1234
  base-url: https://api.base.com
  from: 01000000000
  verification-template: "template"
  templates:
    class-apply: "[TEST] %s님의 %s 클래스에 신청자 %s (%s)가 신청했습니다."
    class-confirmed: "[TEST] %s님, %s 강사의 %s 수강이 확정되었습니다."
    class-cancelled-by-system: "[TEST] %s님, %s 강사의 %s 신청이 자동 취소되었습니다."
    class-cancelled-by-student: "[TEST] %s님, %s 클래스 수강생 %s (%s)가 환불 요청 (%s / %s)을 보냈습니다."
    class-cancel-done: "[TEST] %s님, %s 강사가 %s 신청을 취소 완료 처리했습니다. 환불 계좌: %s"
